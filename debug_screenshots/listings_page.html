<script>
    document.addEventListener("DOMContentLoaded", function () {
        initializeDropdowns();
        restoreActiveMenuItem();
    });

    document.addEventListener("turbo:load", function () {
        initializeDropdowns();
        restoreActiveMenuItem();
    });

    document.addEventListener("turbolinks:load", function () {
        initializeDropdowns();
        restoreActiveMenuItem();
    });

    window.addEventListener('load', function () {
        restoreActiveMenuItem();
    });

    function initializeDropdowns() {
        const dropdownToggles = document.querySelectorAll(".dropdown-toggle");

        dropdownToggles.forEach(function (toggle) {
            toggle.removeEventListener("click", handleToggleClick);
            toggle.addEventListener("click", handleToggleClick);
        });

        const menuItems = document.querySelectorAll(".dropdown__item");
        menuItems.forEach(function (item) {
            item.addEventListener("click", function (event) {
                localStorage.setItem('activeMenuItem', this.getAttribute('href'));
                // Delay to ensure localStorage is set before navigation
                setTimeout(() => {
                    window.location.href = this.getAttribute('href');
                }, 100);
                event.preventDefault();
            });
        });
    }

    function handleToggleClick(e) {
        e.preventDefault();
        const dropdownMenu = this.nextElementSibling;
        const arrowIcon = this.querySelector(".arrow-icon");

        dropdownMenu.classList.toggle("show");
        arrowIcon.classList.toggle("rotated");

        document.querySelectorAll(".dropdown-menu").forEach(function (menu) {
            if (menu !== dropdownMenu) {
                menu.classList.remove("show");
                const arrow = menu.previousElementSibling.querySelector(".arrow-icon");
                if (arrow) {
                    arrow.classList.remove("rotated");
                }
            }
        });
    }

    function restoreActiveMenuItem() {
        const activeItem = localStorage.getItem('activeMenuItem');
        const currentUrl = window.location.href;

        if (activeItem && currentUrl !== activeItem) {
            localStorage.removeItem('activeMenuItem');
        }

        if (activeItem && currentUrl === activeItem) {
            const activeElement = document.querySelector(`[href='${activeItem}']`);
            if (activeElement) {
                const parentMenu = activeElement.closest('.dropdown-menu');
                if (parentMenu) {
                    parentMenu.classList.add("show");
                    const arrowIcon = parentMenu.previousElementSibling.querySelector(".arrow-icon");
                    if (arrowIcon) {
                        arrowIcon.classList.add("rotated");
                    }
                }
                activeElement.classList.add("active");
            }
        }
    }
</script>

<script>
    document.addEventListener("turbo:load", () => {
        const dropdowns = document.querySelectorAll('.dropdown-hover');
        const currentUrl = window.location.href;

        function setActiveMenu() {
            document.querySelectorAll('.dropdown__item').forEach(item => {
                item.classList.remove('active');
            });

            const profileLink = document.querySelector('.dropdown-item[href*="portal/profile"]');
            const teamLink = document.querySelector('.dropdown-item[href*="portal/team"]');

            if (currentUrl.includes('/portal/profile') && profileLink) {
                profileLink.classList.add('active');
            } else if (currentUrl.includes('/portal/team') && teamLink) {
                teamLink.classList.add('active');
            }
        }

        setActiveMenu();
    });
</script>

        arrow.style.transform = 'rotate(0deg)';
    }

    document.querySelectorAll('.dropdown-toggle').forEach(function (button) {
        button.addEventListener('click', function () {
            var expanded = button.getAttribute('aria-expanded') === 'true';

            var arrow = button.querySelector('.arrow-icon');

    });
